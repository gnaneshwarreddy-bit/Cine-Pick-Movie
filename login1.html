    <style>
        :root {
            --primary: #5599ff;
            --secondary: #ff416c;
            --dark: #0f172a;
            --glass: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-glow: 0 0 15px rgba(85, 153, 255, 0.6);
            --accent-glow: radial-gradient(circle at center, rgba(85, 153, 255, 0.15) 0%, transparent 70%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--dark);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* LOGIN PAGE BACKGROUND SCROLLING */
        .login-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px 0;
            background: #000;
            justify-content: center;
        }

        .login-track {
            display: flex;
            gap: 20px;
            width: max-content;
            opacity: 0.75;
            filter: contrast(1.2) brightness(1.1);
        }

        .login-track.row-1 {
            animation: loginScrollReverse 35s linear infinite;
        }

        .login-track.row-3 {
            animation: loginScroll 50s linear infinite;
        }

        .login-track.row-4 {
            animation: loginScrollReverse 58s linear infinite;
        }

        .login-track img {
            height: 210px;
            width: 145px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease;
        }

        @keyframes loginScroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        @keyframes loginScrollReverse {
            0% {
                transform: translateX(-50%);
            }

            100% {
                transform: translateX(0);
            }
        }

        /* Dark Radial Overlay */
        .body-overlay {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(21, 35, 43, 0.1) 0%, rgba(21, 35, 43, 0.8) 100%);
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 60px 45px;
            background: var(--glass);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow:
                0 25px 50px -12px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.1);
            animation: containerAppear 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: var(--accent-glow);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 35px;
        }

        .logo h1 {
            color: #fff;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 10px rgba(85, 153, 255, 0.3));
        }

        .logo p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 22px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(85, 153, 255, 0.15);
        }

        .input-group input:focus+label {
            color: var(--primary);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox-container input {
            cursor: pointer;
            accent-color: var(--primary);
        }

        .options a {
            color: var(--primary);
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .options a:hover {
            color: var(--secondary);
            text-shadow: 0 0 8px rgba(255, 65, 108, 0.4);
        }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 10px 25px -5px rgba(85, 153, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .login-btn:hover::after {
            left: 100%;
            transition: 0.7s;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(85, 153, 255, 0.6);
            filter: saturate(1.2);
        }

        .login-btn:active {
            transform: translateY(-1px) scale(0.99);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
        }

        .footer a {
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            position: relative;
            padding-bottom: 2px;
        }

        .footer a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--primary);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.3s;
        }

        .footer a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        .error-msg {
            color: #ff5555;
            font-size: 0.85rem;
            margin-top: 15px;
            text-align: center;
            background: rgba(255, 75, 43, 0.1);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 75, 43, 0.2);
            display: none;
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        /* Success Animation State */
        .success-overlay {
            position: fixed;
            inset: 0;
            background: var(--dark);
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        body.logged-in .success-overlay {
            opacity: 1;
        }

        body.logged-in .login-container {
            transform: scale(0.9);
            opacity: 0;
            transition: 0.5s ease;
        }
    </style>

    <div class="login-container">
        <div class="logo">
            <h1>CINE PICK</h1>
            <p>MOVIE RECOMMENDATION PLATFORM</p>
        </div>

        <form id="loginForm">
            <div class="input-group" style="animation: fadeUp 0.6s ease forwards; animation-delay: 0.2s; opacity: 0;">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
            </div>

            <div class="input-group" style="animation: fadeUp 0.6s ease forwards; animation-delay: 0.3s; opacity: 0;">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <div class="options" style="animation: fadeUp 0.6s ease forwards; animation-delay: 0.4s; opacity: 0;">
                <label class="checkbox-container">
                    <input type="checkbox"> Remember me
                </label>
            </div>

            <button type="submit" class="login-btn"
                style="animation: fadeUp 0.6s ease forwards; animation-delay: 0.5s; opacity: 0;">Sign In</button>
            <div id="errorMsg" class="error-msg">Please enter valid credentials.</div>
        </form>

        <div class="footer" style="animation: fadeUp 0.6s ease forwards; animation-delay: 0.6s; opacity: 0;">
            New here? <a href="#">Create an account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (user && pass) {
                // Mock session
                localStorage.setItem('cinepickLoggedIn', 'true');
                localStorage.setItem('cinepickUser', user);

                // Success effect
                document.body.classList.add('logged-in');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 600);
            } else {
                const error = document.getElementById('errorMsg');
                error.style.display = 'block';
                setTimeout(() => {
                    error.style.display = 'none';
                }, 3000);
            }
        });

        // Add subtle parallax to track on mouse move
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) * 0.01;
            const moveY = (e.clientY - window.innerHeight / 2) * 0.01;
            document.querySelector('.login-bg').style.transform = `translate(${moveX}px, ${moveY}px)`;
        });
    </script>
</body>

</html>
